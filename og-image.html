<!DOCTYPE html>
<!--
  Källa för og-image.png (1200×630).
  Regenerera bilden så här (lokal server i repo-roten krävs för typsnitten):

    python3 -m http.server 8742 &
    google-chrome --headless=new --disable-gpu --window-size=1200,630 \
      --screenshot=og-image.png --hide-scrollbars --virtual-time-budget=5000 \
      http://localhost:8742/og-image.html
-->
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Norrtou Creations – og-image (källa)</title>
<link rel="stylesheet" href="/css/fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background: #faf5ec;
    font-family: 'Outfit', sans-serif;
    color: #2c2a21;
  }
  .blob { position: absolute; border-radius: 50%; filter: blur(70px); }
  .blob-sage {
    width: 620px; height: 620px;
    right: -160px; top: -220px;
    background: radial-gradient(circle at 40% 40%, #dde4d0 0%, rgba(221,228,208,0) 70%);
  }
  .blob-peach {
    width: 520px; height: 520px;
    left: -180px; bottom: -220px;
    background: radial-gradient(circle at 60% 40%, #f4ddc8 0%, rgba(244,221,200,0) 70%);
  }
  .watermark {
    position: absolute;
    right: -30px; bottom: -210px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 330;
    font-size: 640px;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px #d6c9ac;
    opacity: .5;
  }
  .inner {
    position: relative;
    height: 100%;
    padding: 64px 80px 56px;
    display: flex;
    flex-direction: column;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand-n {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 44px;
    letter-spacing: -0.02em;
  }
  .brand-c {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.24em;
    color: #9c4e28;
  }
  .headline {
    margin-top: auto;
    font-family: 'Fraunces', serif;
    font-weight: 480;
    font-size: 88px;
    line-height: 1.04;
    letter-spacing: -0.025em;
    max-width: 950px;
  }
  .headline em {
    font-style: italic;
    font-weight: 420;
    color: #9c4e28;
  }
  .meta {
    margin-top: 44px;
    display: flex;
    align-items: center;
    gap: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    letter-spacing: 0.17em;
    text-transform: uppercase;
    color: #585546;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #b35e35; }
  .star { color: #b35e35; letter-spacing: 0; }
</style>
</head>
<body>
  <div class="blob blob-sage"></div>
  <div class="blob blob-peach"></div>
  <div class="watermark">n</div>

  <div class="inner">
    <div class="brand">
      <span class="brand-n">norrtou</span>
      <span class="brand-c">CREATIONS</span>
    </div>

    <div class="headline">
      Jag bygger appar &amp; webbappar<br>
      <em>som sätter människan först.</em>
    </div>

    <div class="meta">
      <span class="dot"></span>
      <span>Appar</span><span class="star">✳</span>
      <span>Webb</span><span class="star">✳</span>
      <span>Tillgänglighet</span><span class="star">✳</span>
      <span>Norrto, Skåne</span>
    </div>
  </div>
</body>
</html>
